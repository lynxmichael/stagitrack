<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StagiTrack – Gestion des stagiaires</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
            colors: {
              primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' },
              accent:  { 100:'#ede9fe',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9' },
              dark:    { 900:'#0f172a',800:'#1e293b',700:'#334155' }
            },
            boxShadow: {
              glass:'0 8px 32px 0 rgba(31,38,135,0.12)',
              neon:'0 0 24px rgba(59,130,246,0.45)',
              card:'0 4px 24px rgba(0,0,0,0.08)'
            },
            animation: { float:'float 6s ease-in-out infinite' },
            keyframes: { float:{ '0%,100%':{ transform:'translateY(0)' },'50%':{ transform:'translateY(-8px)' } } }
          }
        }
      }
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
